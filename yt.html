<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Healthy Together</title>
<link rel="stylesheet" href="ai.css">
</head>

<body>

<header>
<h1 id="judul">Health Website</h1>
<p>Daily healthy living tips</p>
</header>

<section class="card">
<h2>Drink Water</h2>
<p>Drink at least 8 glasses of water every day.</p>
<button onclick="infoAir()">Info</button>
</section>

<section class="card">
<h2>Exercise</h2>
<p>Exercise for at least 30 minutes every day.</p>
<button onclick="infoOlahraga()">Info</button>
</section>

<button class="mode" onclick="ubahWarna()">Healthy Mode</button>
<br>
<input type="number" id="berat" placeholder="Weight (kg)"><br><br>
<input type="number" id="tinggi" placeholder="Height (cm)"><br>
<br><button onclick="hitungBMI()">Calculate BMI</button>

<p id="hasil"></p>

<script>
function hitungBMI(){
let berat = document.getElementById("berat").value;
let tinggi = document.getElementById("tinggi").value / 100;

let bmi = berat / (tinggi * tinggi);

document.getElementById("hasil").innerText = "Your BMI: " + bmi.toFixed(2);
}
</script>

<script src="belajar js.js"></script>

</body>
</html>
