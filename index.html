<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Together</title>

    <link rel="stylesheet" href="ai.css">
</head>

<body>

<header>
    <h1 id="title">Health Website</h1>
    <p>Daily Healthy Living Tips</p>
</header>

<section class="card">
    <h2>Drink Water</h2>
    <p>Drink at least 8 glasses of water every day.</p>
    <button onclick="waterInfo()">Learn More</button>
</section>

<section class="card">
    <h2>Exercise</h2>
    <p>Exercise for at least 30 minutes every day.</p>
    <button onclick="exerciseInfo()">Learn More</button>
</section>

<button class="mode" onclick="toggleTheme()">
    Healthy Mode
</button>

<br><br>

<input
    type="number"
    id="weight"
    placeholder="Weight (kg)"
>

<br><br>

<input
    type="number"
    id="height"
    placeholder="Height (cm)"
>

<br><br>

<button onclick="calculateBMI()">
    Calculate BMI
</button>

<p id="result"></p>

<script>
function calculateBMI() {

    let weight = document.getElementById("weight").value;
    let height = document.getElementById("height").value / 100;

    let bmi = weight / (height * height);

    document.getElementById("result").innerText =
        "Your BMI: " + bmi.toFixed(2);
}
</script>

<script src="belajar-js.js"></script>

</body>
</html>
